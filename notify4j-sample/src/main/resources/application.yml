# notify4j sample configuration.
#
# The sample app declares a NotificationAdapter<String> bean and fires one demo event
# ("build-42:SUCCESS") on startup. With no urls configured below, the event still fans out
# to the always-on logging sink, so the sample runs out of the box. Uncomment a channel to
# see it delivered for real.
notify4j:
  # Apprise/shoutrrr-style channel URLs. Scheme picks the channel; an optional +http/+https
  # suffix picks the transport (default https); ?tags=a,b routes only matching events.
  urls: []
    # - slack://hooks.slack.com/services/T000/B000/XXXX
    # - teams://<power-automate-workflows-webhook>   # legacy O365 connector webhooks retired May 2026
    # - discord://discord.com/api/webhooks/ID/TOKEN
    # - mattermost://my-host/hooks/<key>
    # - rocketchat://my-host/hooks/<id>/<token>
    # - googlechat://chat.googleapis.com/v1/spaces/<space>/messages?key=<k>&token=<t>
    # - telegram://api.telegram.org/<bot-token>/<chat-id>
    # - ntfy://ntfy.sh/<topic>
    # - gotify://my-host/<app-token>
    # - pushover://<app-token>/<user-key>
    # - twilio://<account-sid>:<auth-token>@<from>/<to>      # SMS
    # - signal://<bridge-host>/<from>/<to>                   # via signal-cli REST bridge
    # - whatsapp://<token>@<phone-number-id>/<to>            # Meta WhatsApp Cloud API
    # - zulip://<bot-email>:<api-key>@<host>/<stream>/<topic>
    # - pushbullet://<access-token>
    # - webhook://my-host/notify
    # - pagerduty://<routing-key>?tags=failed
    # - opsgenie://<api-key>?tags=failed

  # Status transitions to suppress on every channel (OLD:NEW, * wildcards). The defaults
  # below mean channels fire on terminal SUCCESS/FAILED, not intermediate states.
  ignore-changes:
    - "*:PENDING"
    - "*:RUNNING"
    - "*:ASSIGNED"

  # Always include the logging sink (handy when no channels are configured). Default: true.
  log: true

  # HTTP timeouts + retry shared by the webhook-style channels (one HttpClient is shared
  # across all of them). Defaults shown. Retries transient 5xx/429/IOException; 4xx fail fast.
  http:
    connect-timeout: 10s
    read-timeout: 10s
    max-attempts: 3        # 1 disables retry
    retry-backoff: 500ms   # doubled each attempt, capped at 30s

  # Asynchronous delivery: send() returns immediately and channels fire concurrently on a
  # shared pool, so one slow channel can't block the caller or its siblings. Defaults shown.
  async:
    enabled: true
    pool-size: 4

  # Email is the one non-URL channel: it uses spring.mail.* for SMTP and activates only
  # when notify4j.email.to is set.
  # email:
  #   to:
  #     - oncall@example.com
  #   from: notify4j@example.com
  #   subject-prefix: "[notify4j]"

# SMTP transport for the email channel (only needed if notify4j.email.to is set above).
# spring:
#   mail:
#     host: smtp.example.com
#     port: 587
#     username: ...
#     password: ...
