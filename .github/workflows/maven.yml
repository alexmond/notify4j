name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for the dependency-graph snapshot submission
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: ./mvnw -B package -Pdefault --no-transfer-progress

      # EnricoMi/publish-unit-test-result-action is added in extraction #2 (it errors when there are
      # no test files; the scaffold has none yet). Codecov test-results upload below covers it meanwhile.

      - name: Add coverage to PR
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ github.workspace }}/*/target/site/jacoco/jacoco.xml
          # flip to true once JaCoCo + real code land (extraction #2)
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ github.workspace }}/**/surefire-reports/TEST-*.xml

      - name: Submit Dependency Snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: advanced-security/maven-dependency-submission-action@v5
